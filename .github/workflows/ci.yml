name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Unit Tests
        run: npm run test

      - name: Build frontend (verify no build errors)
        run: npm run build

  notify-success:
    name: Notify on Success
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Print success message
        run: echo "✅ All CI checks passed! Ready to deploy."
